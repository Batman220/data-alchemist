async function trackLogin(name, email, org, keyHint) {
  if (!TRACKER_URL) return; // tracking disabled if URL not set
  try {
    const sessionId = "sess_" + Math.random().toString(36).slice(2, 10) + "_" + Date.now();
    const browser   = navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge)[\/\s]([\d.]+)/)?.[0] || navigator.userAgent.slice(0,40);
    const timezone  = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
    await fetch(TRACKER_URL, {
      method: "POST",
      mode: "no-cors", // avoids CORS issues with Apps Script
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, org, sessionId, browser, timezone, keyHint }),
    });
  } catch (err) {
    // fail silently — never block the student login
    console.warn("Tracker:", err.message);
  }
}

// ── SESSION PERSISTENCE (localStorage + Google Sheets cloud sync) ─────────
const LS = {
  key: (email) => `alch__${(email||"guest").replace(/[^a-z0-9]/gi,"_").toLowerCase()}`,

  // Local read/write (instant)
  load:  (email) => { try { return JSON.parse(localStorage.getItem(LS.key(email)) || "{}"); } catch { return {}; } },
  save:  (email, data) => { try { localStorage.setItem(LS.key(email), JSON.stringify(data)); } catch {} },
  patch: (email, updater) => {
    const d = LS.load(email);
    const next = updater(d);
    LS.save(email, next);
    if (email) LS.pushCloud(email, next); // fire-and-forget cloud sync
  },

  // Cloud push — save session to Google Sheets (async, silent)
  pushCloud: async (email, data) => {
    if (!TRACKER_URL || !email) return;
    try {
      const { chatHistory, topicCache } = data;
      await fetch(TRACKER_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "saveSession", email,
          name: data._name || "", org: data._org || "",
          sessionData: { chatHistory: chatHistory||{}, topicCache: topicCache||{} },
        }),
      });
    } catch { /* fail silently */ }
  },

  // Cloud pull — fetch session from Sheets on login, merge into localStorage
  pullCloud: async (email) => {
    if (!TRACKER_URL || !email) return { found: false };
    try {
      const url = TRACKER_URL + "?action=getSession&email=" + encodeURIComponent(email);
      const r   = await fetch(url);
      if (!r.ok) return { found: false };
      const json = await r.json();
      if (json.found && json.sessionData) {
        const local  = LS.load(email);
        const merged = {
          ...local,
          chatHistory: { ...(local.chatHistory||{}), ...(json.sessionData.chatHistory||{}) },
          topicCache:  { ...(local.topicCache||{}),  ...(json.sessionData.topicCache||{})  },
        };
        LS.save(email, merged);
        return { found: true, lastSaved: json.lastSaved, saveCount: json.saveCount };
      }
      return { found: false };
    } catch { return { found: false }; }
  },
};

// ── MARKDOWN RENDERER ─────────────────────────────────────────────────────
const parseInline = (str, key) => {
  const parts = String(str).split(/(\*\*[^*\n]+\*\*|\*[^*\n]+\*|`[^`\n]+`)/g);
  return parts.map((t, i) => {
    if (t.startsWith("**") && t.endsWith("**")) return <strong key={i}>{t.slice(2,-2)}</strong>;
    if (t.startsWith("*")  && t.endsWith("*"))  return <em key={i}>{t.slice(1,-1)}</em>;
    if (t.startsWith("`")  && t.endsWith("`"))
      return <code key={i} style={{background:"#F1F5F9",borderRadius:4,padding:"1px 5px",
        fontSize:"0.88em",fontFamily:"monospace",color:"#0891B2"}}>{t.slice(1,-1)}</code>;
    return t;
  });
};
const MD = ({text, color}) => {
  if (!text) return null;
  const c = color || "#1A3050";
  const lines = String(text).split("\n");
  const out = [];
  let listBuf = [], listType = null;
  const flushList = () => {
    if (!listBuf.length) return;
    const Tag = listType === "ol" ? "ol" : "ul";
    out.push(React.createElement(Tag, {key:"l"+out.length,
      style:{paddingLeft:20,margin:"6px 0 8px",color:c}},
      listBuf.map((li,i) => <li key={i} style={{marginBottom:4,lineHeight:1.75}}>{parseInline(li)}</li>)
    ));
    listBuf = []; listType = null;
  };
  lines.forEach((raw, i) => {
    const line = raw;
    if (/^### /.test(line)) {
      flushList();
      out.push(<div key={i} style={{fontWeight:700,fontSize:13.5,color:c,marginTop:12,marginBottom:3}}>{parseInline(line.slice(4))}</div>);
    } else if (/^## /.test(line)) {
      flushList();
      out.push(<div key={i} style={{fontFamily:"Bricolage Grotesque,sans-serif",fontWeight:800,
        fontSize:15,color:c,marginTop:14,marginBottom:5,
        borderBottom:"1.5px solid #E2E8F0",paddingBottom:4}}>{parseInline(line.slice(3))}</div>);
    } else if (/^# /.test(line)) {
      flushList();
      out.push(<div key={i} style={{fontFamily:"Bricolage Grotesque,sans-serif",fontWeight:800,
        fontSize:17,color:c,marginTop:16,marginBottom:8}}>{parseInline(line.slice(2))}</div>);
    } else if (/^[-*] /.test(line)) {
      listType = "ul"; listBuf.push(line.slice(2));
    } else if (/^\d+\. /.test(line)) {
      listType = "ol"; listBuf.push(line.replace(/^\d+\. /,""));
    } else if (/^---+$/.test(line.trim())) {
      flushList();
      out.push(<hr key={i} style={{border:"none",borderTop:"1.5px solid #E2E8F0",margin:"10px 0"}}/>);
    } else if (line.trim() === "") {
      flushList();
      out.push(<div key={i} style={{height:5}}/>);
    } else {
      flushList();
      out.push(<div key={i} style={{lineHeight:1.85,marginBottom:1,color:c}}>{parseInline(line)}</div>);
    }
  });
  flushList();
  return <div style={{fontSize:14}}>{out}</div>;
};

// ─── API ─────────────────────────────────────────────────────────────────
async function callAI(key, model, msgs, sys, cb) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key":key,
      "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify({ model, max_tokens:850, system:sys, stream:true, messages:msgs }),
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || "API error"); }
  const rd = r.body.getReader(), dc = new TextDecoder(); let full = "";
  while (true) {
    const {done,value} = await rd.read(); if (done) break;
    for (const ln of dc.decode(value).split("\n")) {
      if (ln.startsWith("data: ")) { try { const d = JSON.parse(ln.slice(6));
        if (d.type==="content_block_delta"&&d.delta?.text) { full+=d.delta.text; cb(full); } } catch{} }
    }
  }
  return full;
}

              ANTHROPIC API KEY <span style={{color:"#FB7185"}}>*</span>
            </label>
            <input className="inp-dark" value={key} onChange={e=>setKey(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&go()} type="password" placeholder="sk-ant-api03-…"/>
          </div>
        </div>

        {err&&(
          <div style={{background:"rgba(251,113,133,.08)",border:"1px solid rgba(251,113,133,.25)",
            borderRadius:12,padding:"10px 14px",fontSize:13,color:"#FB7185",marginBottom:14}}>{err}</div>
        )}

        <button onClick={go} disabled={loading}
          style={{width:"100%",
            background:loading?"rgba(255,255,255,.05)":"linear-gradient(135deg,#059669 0%,#0284C7 35%,#6D28D9 68%,#D946EF 100%)",
            border:loading?"1px solid rgba(255,255,255,.08)":"1px solid transparent",
            color:loading?"rgba(255,255,255,.3)":"#fff",
            borderRadius:14,padding:"15px 14px",fontSize:15,fontWeight:700,
            fontFamily:"Bricolage Grotesque,sans-serif",
            cursor:loading?"not-allowed":"pointer",letterSpacing:".4px",
            boxShadow:loading?"none":"0 0 40px rgba(139,92,246,.35), 0 4px 24px rgba(0,0,0,.5)",
            transition:"all .25s"}}>
          {syncing?"☁️ Restoring your session…":loading?"Verifying key…":"Enter the Lab →"}
        </button>

        <QuoteRotator/>
      </div>
    </div>
  );
};

// ─── CHAT MODAL ───────────────────────────────────────────────────────────
const ChatModal = ({apiKey, mod, mode, onClose, userEmail}) => {
  const histKey = `${mod.id}::${mode}`;
  const stored  = LS.load(userEmail);
  const initMsgs = stored.chatHistory?.[histKey] || [];

  const [msgs,setMsgs]       = useState(initMsgs);
  const [inp,setInp]         = useState("");
  const [loading,setLoading] = useState(false);
  const [stream,setStream]   = useState("");
  const [err,setErr]         = useState("");
  const bot = useRef(null);

  const cfgs = {
    tutor:  { icon:"🤖", label:"AI Tutor",        ph:`Ask anything about ${mod.label}…`, model:MH,
      starter:`Hi! I'm ALCH 🤖 your tutor for **${mod.label}**.\n\nWhat would you like to understand? No question is too basic — ask away!`,
      sys:`${BSYS}\nFocus: ${mod.label}. Respond with proper structure when explaining concepts: use ## for section headings, **bold** for key terms, - bullet points for lists. Give thorough explanations with real-world analogies. Never give one-liner answers unless the question is simple.` },
    quiz:   { icon:"⚡", label:"Quiz Forge",       ph:"Type your answer…", model:MH, starter:null,
      sys:`${BSYS}\nQUIZ MODE for ${mod.label}: ONE creative real-world scenario question (not MCQ). After answer: use ## to structure feedback — **What You Got Right**, **What Was Missing**, **The Full Picture**. Always offer another round.` },
    explain:{ icon:"🎤", label:"Teach It Back",    ph:"Explain it in your own words…", model:MH,
      starter:`Pick any concept from **${mod.label}** and explain it to me like teaching a colleague.\n\nPlain English is fine — I'll grade you **/10** and tell you exactly what landed and what didn't. 🎤`,
      sys:`${BSYS}\nEXPLAIN-BACK for ${mod.label}: Student explains a concept. Grade /10. Use ## Score, ## What Landed, ## What Was Missing, ## The Part You Should Know. Be warm but precise.` },
    confess:{ icon:"🎪", label:"Confession Booth", ph:"What don't you actually understand?", model:MH,
      starter:`Confession Booth 🎪\n\nZero judgment. Zero shame.\n\nWhat's *really* confusing you about **${mod.label}**? Even the stuff you'd never ask in class — especially that.`,
      sys:`${BSYS}\nCONFESSION BOOTH for ${mod.label}: No judgment ever. Structure the answer: ## The Simple Truth, ## Why It Confuses Everyone, ## The Analogy That Makes It Click, ## One Thing To Remember. Celebrate honesty loudly.` },
    socratic:{ icon:"🏛️", label:"Socratic Dialogue", ph:"Answer, or ask — the dialogue leads you there…", model:MH,
      starter:`Welcome to Socratic Dialogue 🏛️\n\nI won't explain anything directly. Instead I'll ask you questions — one at a time — that guide you to the answer yourself.\n\nThat's the deal: I question, you think, you discover.\n\nLet's start with **${mod.label}**. Tell me — what do you already think you know about it?`,
      sys:`${BSYS}\nSOCRATIC MODE for ${mod.label}: NEVER give direct answers or explanations. ONLY ask probing questions that lead the student to discover concepts themselves. One question at a time. If they answer well, acknowledge briefly then probe deeper. If stuck, simplify. If they ask you to explain directly, gently decline and reframe as a question. End every response with exactly one question. Be warm but relentless.` },
  };
  const cf = cfgs[mode] || cfgs.tutor;
  const c  = mod.hex;

  // Persist chat history whenever msgs changes
  useEffect(()=>{
    if (msgs.length === 0) return;
    LS.patch(userEmail, d => ({
      ...d,
      chatHistory: { ...(d.chatHistory||{}), [histKey]: msgs.slice(-60) } // keep last 60 msgs
    }));
  }, [msgs]);

  useEffect(()=>{
    if (initMsgs.length > 0) return; // restored — don't re-kick
    if (cf.starter) setMsgs([{role:"assistant",content:cf.starter,id:Date.now()}]);
    else kick();
  },[]);

  useEffect(()=>{ bot.current?.scrollIntoView({behavior:"smooth"}); },[msgs,stream]);

  async function kick() {
    setLoading(true); setStream("");
    try { let o=""; await callAI(apiKey,cf.model,[{role:"user",content:"Begin."}],cf.sys,t=>{o=t;setStream(t)});
      setStream(""); setMsgs([{role:"assistant",content:o,id:Date.now()}]); }
    catch(e) { setErr(e.message); } setLoading(false);
  }
  async function send() {
    if(!inp.trim()||loading) return;
    const u={role:"user",content:inp.trim(),id:Date.now()}, all=[...msgs,u];
    setMsgs(all); setInp(""); setLoading(true); setStream(""); setErr("");
    try { let o=""; await callAI(apiKey,cf.model,all.map(m=>({role:m.role,content:m.content})),cf.sys,t=>{o=t;setStream(t)});
      setStream(""); setMsgs(p=>[...p,{role:"assistant",content:o,id:Date.now()}]); }
    catch(e) { setErr(e.message); } setLoading(false);
  }
  function clearHistory() {
    LS.patch(userEmail, d => { const h={...(d.chatHistory||{})}; delete h[histKey]; return {...d,chatHistory:h}; });
    setMsgs([]); setErr("");
    if (cf.starter) setMsgs([{role:"assistant",content:cf.starter,id:Date.now()}]);
    else kick();
  }

  const hasHistory = initMsgs.length > 0;

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(8,20,42,.45)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(8px)"}}>
      <div style={{width:"100%",maxWidth:720,background:"#fff",border:`1.5px solid ${c}33`,
        borderRadius:26,display:"flex",flexDirection:"column",maxHeight:"90vh",
        boxShadow:`0 24px 60px ${c}20`}}>
        <div style={{padding:"16px 20px",borderBottom:`1.5px solid ${c}18`,
          display:"flex",alignItems:"center",justifyContent:"space-between",
          background:`${c}08`,borderRadius:"24px 24px 0 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:14,background:mod.light,
              border:`1.5px solid ${c}44`,display:"flex",alignItems:"center",
              justifyContent:"center",fontSize:22}}>{mod.icon}</div>
            <div>
              <div className="dsp" style={{fontWeight:700,fontSize:17,color:c}}>{cf.label}</div>
              <div style={{fontSize:11,color:"#7A9CC4",display:"flex",alignItems:"center",gap:8}}>
                {mod.icon} {mod.label} · ALCH · Haiku
                {hasHistory && <span style={{background:c+"18",border:`1px solid ${c}44`,color:c,
                  borderRadius:10,padding:"0px 7px",fontSize:10,fontWeight:700}}>
                  💾 Session restored
                </span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {msgs.length > 1 && (
              <button onClick={clearHistory}
                style={{background:"#FFF8E7",border:"1.5px solid #FDE68A",color:"#92400E",
                  borderRadius:10,padding:"6px 12px",cursor:"pointer",fontSize:11,fontWeight:600}}>
                🗑️ Clear
              </button>
            )}
            <button onClick={onClose} style={{background:"rgba(0,0,0,.05)",border:"1px solid #E2E8F0",
              color:"#64748B",borderRadius:10,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:600}}>
              ✕ Close
            </button>
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:22,display:"flex",flexDirection:"column",gap:14}}>
          {msgs.map(m=>(
            <div key={m.id} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              {m.role==="user" ? (
                <div style={{maxWidth:"78%",background:`${c}12`,border:`1.5px solid ${c}44`,
                  borderRadius:"18px 18px 4px 18px",padding:"11px 15px",color:c,
                  fontSize:14,fontWeight:500,lineHeight:1.7}}>
                  {m.content}
                </div>
              ) : (
                <div style={{maxWidth:"86%",background:"#F4F9FF",border:"1.5px solid #E2E8F0",
                  borderRadius:"4px 18px 18px 18px",padding:"14px 18px"}}>
                  <MD text={m.content} color="#1A3050"/>
                </div>
              )}
            </div>
          ))}
          {loading && (
            <div style={{display:"flex"}}>
              <div style={{background:"#F4F9FF",border:"1.5px solid #E2E8F0",
                borderRadius:"4px 18px 18px 18px",padding:"14px 18px",maxWidth:"86%"}}>
                {stream ? <MD text={stream} color="#1A3050"/> : <Dots c={c}/>}
              </div>
            </div>
          )}
          {err && <div style={{background:"#FFF1F2",border:"1.5px solid #FECDD3",borderRadius:10,
            padding:"10px 14px",fontSize:13,color:"#BE123C"}}>{err}</div>}
          <div ref={bot}/>
        </div>

        <div style={{padding:"14px 18px",borderTop:`1.5px solid ${c}18`,display:"flex",
          gap:10,background:"#FAFBFF",borderRadius:"0 0 24px 24px"}}>
          <input className="inp" style={{flex:1}} value={inp} onChange={e=>setInp(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder={cf.ph} disabled={loading}/>
          <button onClick={send} disabled={loading||!inp.trim()}
            style={{background:c,border:"none",color:"#fff",borderRadius:12,padding:"11px 22px",
              fontSize:13,fontWeight:700,cursor:loading||!inp.trim()?"not-allowed":"pointer",
              opacity:loading||!inp.trim()?.4:1}}>
            Send ↵
          </button>
        </div>
      </div>
    </div>
  );
};

// DQ: 6 Dimensions Wheel
const DQWheel = ({hex}) => {
  const [sel,setSel] = React.useState(null);
  const dims = [
    {id:"completeness", label:"Completeness", icon:"🧩", color:"#0284C7",
     def:"Are all required fields populated?",
     example:"A customer record missing phone number → 80% complete",
     mistake:"Confusing completeness with accuracy — a field can be filled but wrong"},
    {id:"accuracy",     label:"Accuracy",     icon:"🎯", color:"#059669",
     def:"Does the data correctly reflect reality?",
     example:"Customer address shows 'Dubai' but they moved to Abu Dhabi",
     mistake:"Assuming sourced data is automatically accurate — validate against authoritative sources"},
    {id:"consistency",  label:"Consistency",  icon:"🔄", color:"#D97706",
     def:"Is the same data stored the same way across systems?",
     example:"CRM shows DOB as 1990-01-15, ERP shows 15/01/90 — same person, different format",
     mistake:"Treating consistency as a formatting issue only — it's also about conflicting values"},
    {id:"timeliness",   label:"Timeliness",   icon:"⏱️", color:"#6D28D9",
     def:"Is data available when needed and reflecting current state?",
     example:"Stock price updated every 15 mins — stale for high-frequency trading",
     mistake:"Focusing on recency without defining what 'timely enough' means for the use case"},
    {id:"uniqueness",   label:"Uniqueness",   icon:"☝️", color:"#E11D48",
     def:"Is each entity represented exactly once?",
     example:"Same customer in CRM as 'John Smith' and 'J. Smith' — two records, one person",
     mistake:"Treating deduplication as a one-time exercise — duplicates re-enter continuously"},
    {id:"validity",     label:"Validity",     icon:"✅", color:"#0891B2",
     def:"Does data conform to defined rules, formats and constraints?",
     example:"Email field contains 'N/A' — technically filled (complete) but not a valid email",
     mistake:"Conflating validity with accuracy — valid data can still be factually wrong"},
  ];
  const cx=160, cy=160, R=110, r=48;
  return (
    <div style={{background:"#F8FAFC",border:"1.5px solid #D9E8F7",borderRadius:16,padding:20,marginBottom:18}}>
      <div style={{fontSize:10,color:hex,letterSpacing:2,fontWeight:700,marginBottom:14}}>🔬 THE 6 DQ DIMENSIONS — click any segment</div>
      <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap"}}>
        <svg width="320" height="320" viewBox="0 0 320 320" style={{flex:"0 0 320px"}}>
          {dims.map((d,i)=>{
            const angle = (i/6)*Math.PI*2 - Math.PI/2;
            const a1=(i/6)*Math.PI*2-Math.PI/2, a2=((i+1)/6)*Math.PI*2-Math.PI/2;
            const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
            const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
            const xi1=cx+r*Math.cos(a1),yi1=cy+r*Math.sin(a1);
            const xi2=cx+r*Math.cos(a2),yi2=cy+r*Math.sin(a2);
            const mx=cx+(R+r)/2*Math.cos(angle+Math.PI/6);
            const my=cy+(R+r)/2*Math.sin(angle+Math.PI/6);
            const isSelected=sel===d.id;
            return (
              <g key={d.id} onClick={()=>setSel(sel===d.id?null:d.id)} style={{cursor:"pointer"}}>
                <path d={`M ${xi1} ${yi1} L ${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2} L ${xi2} ${yi2} A ${r} ${r} 0 0 0 ${xi1} ${yi1}`}
                  fill={isSelected?d.color:d.color+"25"} stroke="#fff" strokeWidth="3"
                  style={{transition:"all .2s",filter:isSelected?"drop-shadow(0 4px 12px "+d.color+"66)":"none"}}/>
                <text x={mx} y={my-7} textAnchor="middle" fontSize="16" style={{pointerEvents:"none"}}>{d.icon}</text>
                <text x={mx} y={my+10} textAnchor="middle" fontSize="9" fontWeight="700"
                  fill={isSelected?"#fff":d.color} style={{pointerEvents:"none"}}>{d.label}</text>
              </g>
            );
          })}
          <circle cx={cx} cy={cy} r={r-4} fill="#fff" stroke="#E2E8F0" strokeWidth="2"/>
          <text x={cx} y={cy-6} textAnchor="middle" fontSize="18">🔬</text>
          <text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fontWeight="700" fill="#4A6FA5">6 DQ</text>
          <text x={cx} y={cy+22} textAnchor="middle" fontSize="9" fill="#94A3B8">Dimensions</text>
        </svg>
        <div style={{flex:1,minWidth:200}}>
          {sel ? (() => { const d=dims.find(x=>x.id===sel); return (
            <div style={{background:"#fff",border:`2px solid ${d.color}44`,borderRadius:14,padding:18,animation:"shimIn .25s ease"}}>
              <div style={{fontSize:22,marginBottom:6}}>{d.icon}</div>

const ETLFlow = ({hex}) => {
  const [sel,setSel] = React.useState(null);
  const [mode,setMode] = React.useState("etl");
  const stages = {
    etl:[
      {id:"extract",    icon:"📤", label:"Extract",   color:"#059669", light:"#ECFDF5",
       what:"Pull raw data from source systems — databases, APIs, files, streams.",
       how:"Full extract (snapshot) or incremental (delta/CDC). Must handle timeouts, retries, schema drift.",
       gotcha:"Source systems get hit directly — heavy extracts can degrade production performance."},
      {id:"transform",  icon:"⚙️", label:"Transform",  color:"#D97706", light:"#FFFBEB",
       what:"Cleanse, reshape, enrich, and apply business rules before loading.",
       how:"Happens in a dedicated ETL engine or middleware. Joins, aggregations, deduplication, type coercion.",
       gotcha:"Transformation bottleneck — complex logic here is where ETL pipelines slow down."},
      {id:"load",       icon:"📥", label:"Load",       color:"#0284C7", light:"#E0F2FE",
       what:"Write the transformed data into the target system — DW, data lake, MDM hub.",
       how:"Full load (truncate + reload) or incremental (upsert/merge). Manage indexes, locks, constraints.",
       gotcha:"Load failures midway leave target in a partial state — always design for idempotency."},
    ],
    elt:[
      {id:"extract",    icon:"📤", label:"Extract",   color:"#059669", light:"#ECFDF5",
       what:"Pull raw data from sources and land it as-is into the target (data lake/cloud DW).",
       how:"Typically lighter — no transformation logic needed at extraction time. Raw zone landing.",
       gotcha:"Raw data accumulates fast — data lake becomes a data swamp without governance."},
      {id:"load",       icon:"📥", label:"Load (Raw)", color:"#0284C7", light:"#E0F2FE",
       what:"Load raw, untransformed data directly into the target storage layer.",
       how:"Cheap cloud storage means you load first, ask questions later. Parquet, Delta, Iceberg formats.",
       gotcha:"Schema-on-read sounds flexible — until different teams interpret the same raw data differently."},
      {id:"transform",  icon:"⚙️", label:"Transform",  color:"#D97706", light:"#FFFBEB",
       what:"Transform inside the target using its compute power (dbt, Spark, BigQuery SQL).",
       how:"T happens in the warehouse/lake. Multiple transformation layers: raw → cleansed → curated → mart.",
       gotcha:"Transformation logic scattered across SQL models — version control and testing become critical."},
    ]
  };
  const cur = stages[mode];
  return (
    <div style={{background:"#F8FAFC",border:"1.5px solid #D9E8F7",borderRadius:16,padding:20,marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div style={{fontSize:10,color:hex,letterSpacing:2,fontWeight:700}}>⚙️ PIPELINE FLOW — click any stage</div>
        <div style={{display:"flex",gap:8}}>
          {["etl","elt"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setSel(null)}}
              style={{background:mode===m?hex+"20":"#fff",border:`1.5px solid ${mode===m?hex:"#D9E8F7"}`,
                color:mode===m?hex:"#7A9CC4",borderRadius:20,padding:"5px 16px",fontSize:12,
                fontWeight:700,cursor:"pointer",letterSpacing:1}}>{m.toUpperCase()}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:0,justifyContent:"center",flexWrap:"wrap",rowGap:12,marginBottom:16}}>
        {cur.map((s,i)=>(
          <React.Fragment key={s.id+mode}>
            <div onClick={()=>setSel(sel===s.id?null:s.id)}
              style={{background:sel===s.id?s.color:s.light,border:`2px solid ${s.color}${sel===s.id?"ff":"66"}`,
                borderRadius:16,padding:"16px 22px",textAlign:"center",cursor:"pointer",minWidth:120,
                transition:"all .2s",transform:sel===s.id?"scale(1.06)":"scale(1)",
                boxShadow:sel===s.id?`0 6px 20px ${s.color}44`:"none"}}>
              <div style={{fontSize:28,marginBottom:6}}>{s.icon}</div>
              <div style={{fontFamily:"Bricolage Grotesque,sans-serif",fontSize:14,fontWeight:800,
                color:sel===s.id?"#fff":s.color}}>{s.label}</div>
            </div>
            {i<cur.length-1 && (
              <div style={{fontSize:22,color:sel?(cur[i].color):"#CBD5E1",padding:"0 6px",fontWeight:700}}>→</div>
            )}
          </React.Fragment>
        ))}
      </div>
      {sel && (() => { const s=cur.find(x=>x.id===sel); return (
        <div style={{background:"#fff",border:`2px solid ${s.color}44`,borderRadius:14,padding:18,animation:"shimIn .25s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
            <div><div style={{fontSize:11,fontWeight:700,color:s.color,letterSpacing:1,marginBottom:6}}>WHAT</div>
              <div style={{fontSize:13,color:"#1A3050",lineHeight:1.7}}>{s.what}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:s.color,letterSpacing:1,marginBottom:6}}>HOW</div>
              <div style={{fontSize:13,color:"#4A6FA5",lineHeight:1.7}}>{s.how}</div></div>
            <div><div style={{fontSize:11,fontWeight:700,color:"#E11D48",letterSpacing:1,marginBottom:6}}>GOTCHA ⚠️</div>
              <div style={{fontSize:13,color:"#E11D48",lineHeight:1.7}}>{s.gotcha}</div></div>
          </div>
        </div>
      )})()}
      {!sel && <div style={{textAlign:"center",color:"#94A3B8",fontSize:13,padding:"8px 0"}}>👆 Click Extract, Transform or Load to see what happens inside each stage</div>}
    </div>
  );
};

      treeEl.innerHTML = '';
      relEl.style.display = 'none';
      relEl.innerHTML = '';
      document.getElementById('hier-detail').innerHTML = `<div class="detail-empty"><div class="icon">🌳</div><div style="font-size:14px;font-weight:600;color:#64748b">Click any node</div><div style="font-size:12px;text-align:center">to understand its role in the hierarchy</div></div>`;

      function buildNode(node) {
        const wrap = document.createElement('div');
        wrap.className = 'tree-node';
        const box = document.createElement('div');
        box.className = 'node-box';
        box.style.cssText = `background:${node.light};border-color:${node.border};color:${node.color}`;
        box.innerHTML = `${node.icon} ${node.label}<span class="node-tag" style="background:${node.border};color:${node.color}">${node.tag}</span>`;
        box.onclick = () => window.selectNode(node, box);
        wrap.appendChild(box);
        if(node.children && node.children.length) {
          const children = document.createElement('div');
          children.className = 'tree-children';
          node.children.forEach(c => children.appendChild(buildNode(c)));
          wrap.appendChild(children);
        }
        return wrap;

      data.nodes.forEach(n => treeEl.appendChild(buildNode(n)));

const ModCard = ({apiKey, mod, onChat, userEmail}) => {
  const [open,setOpen]   = useState(false);
  const [topic,setTopic] = useState(null);
  const [depth,setDepth] = useState("quick"); // "quick" | "deep"
  const [ltopic,setLtopic] = useState(null);
  const c = mod.hex;

  // Load topic cache from localStorage on mount
  const [tdata,setTdata] = useState(()=>{
    const stored = LS.load(userEmail);
    return stored.topicCache?.[mod.id] || {};
  });

  // Save topic cache whenever it changes
  useEffect(()=>{
    if (Object.keys(tdata).length === 0) return;
    LS.patch(userEmail, d => ({
      ...d,
      topicCache: { ...(d.topicCache||{}), [mod.id]: tdata }
    }));
  }, [tdata]);

  const depthKey = (t) => `${t}::${depth}`;

  async function explain(t) {
    const k = depthKey(t);
    if (tdata[k]) { setTopic(t); return; }
    setLtopic(t); setTopic(t);
    const prompt = depth === "quick"
      ? `Explain "${t}" in context of ${mod.label}: 4-5 punchy sentences, one real-world analogy, one thing students always get wrong. Engaging tone.`
      : `Give a thorough explanation of "${t}" in context of ${mod.label}. Structure your response with:
## What Is It?
Clear definition in plain English.
## Why It Matters
Why practitioners actually care about this in the real world.
## How It Works
The mechanism — steps, rules, or logic involved.
## Real-World Example
A concrete scenario (preferably enterprise data context).
## Common Mistakes
2-3 things people get wrong about this concept.
## How It Connects
How this links to other parts of ${mod.label} or the broader data journey.
Be thorough but sharp — no filler, no waffle.`;
    try {
      let o = "";
      await callAI(apiKey, MH,
        [{role:"user",content:prompt}],
        BSYS, tt=>{ o=tt; setTdata(p=>({...p,[k]:tt})); });
    } catch { setTdata(p=>({...p,[k]:"⚠️ Error — check API key."})); }
    setLtopic(null);
  }

  return (
    <div className="card" style={{overflow:"hidden",
      borderColor:open?`${c}44`:"var(--bdr)",
      boxShadow:open?`0 8px 36px ${c}14`:"none"}}>
      <div onClick={()=>setOpen(!open)}
        style={{padding:"22px 26px",cursor:"pointer",display:"flex",alignItems:"center",
          justifyContent:"space-between",background:open?mod.light:"#fff",transition:"background .2s"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{width:56,height:56,borderRadius:16,background:mod.light,
            border:`2px solid ${c}33`,display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:28}}>{mod.icon}</div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div className="dsp" style={{fontSize:21,fontWeight:800,color:c}}>{mod.label}</div>
              {mod.done && <span style={{background:c+"15",border:`1.5px solid ${c}44`,color:c,borderRadius:20,padding:"2px 12px",fontSize:11,fontWeight:700}}>✅ Completed</span>}
            </div>
            <div style={{fontSize:13,color:"#7A9CC4",marginTop:2}}>{mod.tagline}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{background:mod.light,border:`1.5px solid ${c}44`,color:c,
            borderRadius:20,padding:"3px 14px",fontSize:11,fontWeight:700}}>
            {mod.topics.length} topics
          </span>
          <span style={{color:c,fontSize:20,fontWeight:700}}>{open?"▲":"▼"}</span>
        </div>
      </div>

      {open && (
        <div style={{borderTop:`1.5px solid ${c}18`}}>
          <div style={{padding:"22px 26px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
            <div style={{background:mod.light,border:`1.5px solid ${c}33`,borderRadius:16,padding:20}}>
              <div style={{fontSize:10,color:c,letterSpacing:2,marginBottom:8,fontWeight:700}}>
                📖 WHAT IS {mod.short}?
              </div>
              <div style={{fontSize:14,color:"#1A3050",lineHeight:1.85,marginBottom:12}}>{mod.what}</div>
              <div style={{fontSize:13,color:"#4A6FA5",fontStyle:"italic",
                borderTop:`1.5px solid ${c}20`,paddingTop:12}}>{mod.analogy}</div>
            </div>
            <div style={{background:"#F4F9FF",border:"1.5px solid #D9E8F7",borderRadius:16,padding:20}}>
              <div style={{fontSize:10,color:"#7A9CC4",letterSpacing:2,marginBottom:8,fontWeight:700}}>
                🤝 HANDSHAKE
              </div>
              <div style={{fontSize:12,color:"#7A9CC4",marginBottom:10}}>
                {mod.shake.from} → <span style={{color:c,fontWeight:700}}>{mod.shake.to}</span>
              </div>
              <div style={{fontSize:14,color:"#4A6FA5",lineHeight:1.85}}>{mod.shake.why}</div>
            </div>
          </div>

          <div style={{padding:"0 26px 18px",display:"flex",gap:10,flexWrap:"wrap"}}>
            {[
              {mode:"tutor",   l:"🤖 AI Tutor",         c:mod.hex},
              {mode:"quiz",    l:"⚡ Quiz Forge",         c:"#D97706"},
              {mode:"explain", l:"🎤 Teach It Back",     c:"#6D28D9"},

              <button key={b.mode} onClick={()=>onChat(mod,b.mode)}
                style={{background:`${b.c}12`,border:`1.5px solid ${b.c}44`,color:b.c,
                  borderRadius:12,padding:"9px 18px",fontSize:13,fontWeight:600,
                  cursor:"pointer",transition:"all .15s"}}>{b.l}</button>
            ))}
          </div>

          {(mod.id==="dq"||mod.id==="etl"||mod.id==="mdm") && (
            <div style={{padding:"0 26px 8px"}}>
              <DiagramPanel id={mod.id} hex={mod.hex} light={mod.light}/>

          <div style={{padding:"0 26px 26px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div style={{fontSize:10,color:"#7A9CC4",letterSpacing:2,fontWeight:700}}>
                🔬 DEEP DIVE TOPICS — click any for live AI explanation
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:"#94A3B8",fontWeight:600,letterSpacing:1}}>DEPTH</span>
                {[{id:"quick",l:"⚡ Quick",desc:"4-5 sentences + analogy"},{id:"deep",l:"📖 Deep",desc:"Full structured breakdown"}].map(d=>(
                  <button key={d.id} onClick={()=>{setDepth(d.id);setTopic(null);}}
                    title={d.desc}
                    style={{background:depth===d.id?c+"20":"#fff",border:`1.5px solid ${depth===d.id?c:"#D9E8F7"}`,
                      color:depth===d.id?c:"#94A3B8",borderRadius:16,padding:"4px 14px",fontSize:11,
                      fontWeight:700,cursor:"pointer",transition:"all .15s"}}>{d.l}</button>
                ))}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
              {mod.topics.map(t=>(
                <button key={t} onClick={()=>explain(t)}
                  style={{background:topic===t?mod.light:"#F4F9FF",
                    border:topic===t?`1.5px solid ${c}66`:"1.5px solid #D9E8F7",
                    borderRadius:12,padding:"10px 14px",
                    color:topic===t?c:"#4A6FA5",fontSize:13,
                    fontWeight:topic===t?700:500,cursor:"pointer",
                    textAlign:"left",transition:"all .15s",
                    position:"relative"}}>
                  {ltopic===t ? "⏳ Loading…" : t+" →"}
                  {tdata[depthKey(t)] && <span style={{position:"absolute",top:4,right:6,
                    fontSize:9,color:c+"88"}}>✓</span>}
                </button>
              ))}
            </div>
            {topic && (
              <div style={{marginTop:18,background:mod.light,border:`1.5px solid ${c}44`,
                borderRadius:16,padding:20,animation:"shimIn .3s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div className="dsp" style={{fontSize:14,fontWeight:800,color:c}}>
                    {mod.icon} {topic}
                  </div>
                  <span style={{fontSize:10,background:c+"18",border:`1px solid ${c}33`,color:c,
                    borderRadius:10,padding:"2px 9px",fontWeight:700}}>
                    {depth==="quick"?"⚡ Quick":"📖 Deep"}
                  </span>
                </div>
                <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",
                  border:`1px solid ${c}22`}}>
                  {tdata[depthKey(topic)]
                    ? <MD text={tdata[depthKey(topic)]} color="#1A3050"/>
                    : <Dots c={c}/>}
                </div>
                <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
                  <button onClick={()=>onChat(mod,"tutor")}
                    style={{background:`${c}12`,border:`1.5px solid ${c}44`,color:c,
                      borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                    💬 Ask ALCH more →
                  </button>
                  {depth==="quick" && tdata[depthKey(topic)] && (
                    <button onClick={()=>{setDepth("deep");explain(topic);}}
                      style={{background:"#fff",border:"1.5px solid #D9E8F7",color:"#4A6FA5",
                        borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      📖 Go deeper →
                    </button>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── QUICK ASK ────────────────────────────────────────────────────────────
const QAsk = ({apiKey}) => {
  const [open,setOpen]     = useState(false);
  const [q,setQ]           = useState("");
  const [a,setA]           = useState("");
  const [loading,setLoading] = useState(false);
  async function ask() {
    if(!q.trim()||loading) return; setLoading(true); setA("");
    try { await callAI(apiKey,MH,[{role:"user",content:q}],
      BSYS+"\nAnswer in 2-4 punchy sentences max.",t=>setA(t)); }
    catch(e) { setA("Error: "+e.message); } setLoading(false);
  }
  return (
    <>
      <button onClick={()=>{ setOpen(!open); if(!open) setA(""); }}
        style={{position:"fixed",bottom:24,right:24,zIndex:500,width:58,height:58,
          borderRadius:"50%",background:"linear-gradient(135deg,#0284C7,#6D28D9)",
          border:"none",cursor:"pointer",display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:26,
          boxShadow:"0 6px 28px rgba(2,132,199,.35)",transition:"transform .15s"}}>
        {open ? "✕" : "🤖"}
      </button>
      {open && (
        <div style={{position:"fixed",bottom:96,right:24,zIndex:500,width:355,background:"#fff",
          border:"1.5px solid #BAE6FD",borderRadius:22,
          boxShadow:"0 10px 50px rgba(2,132,199,.18)",overflow:"hidden",animation:"fadeUp .2s ease"}}>
          <div className="dsp" style={{padding:"12px 18px",background:"#E0F2FE",
            borderBottom:"1.5px solid #BAE6FD",fontSize:13,fontWeight:700,color:"#0284C7"}}>
            ⚡ Quick Ask ALCH · Haiku
          </div>
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {a && <div style={{background:"#F4F9FF",border:"1.5px solid #D9E8F7",borderRadius:12,
              padding:12,fontSize:13,color:"#1A3050",lineHeight:1.7,
              whiteSpace:"pre-wrap",maxHeight:180,overflowY:"auto"}}>{a}</div>}
            {loading && !a && <Dots c="#0284C7"/>}
            <input className="inp" value={q} onChange={e=>setQ(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&ask()} placeholder="Ask anything about DQ, MDM, DG…"/>
            <button onClick={ask} disabled={loading||!q.trim()}
              style={{background:"#0284C7",border:"none",color:"#fff",borderRadius:10,
                padding:10,fontSize:13,fontWeight:700,
                cursor:loading||!q.trim()?"not-allowed":"pointer",
                opacity:loading||!q.trim()?.4:1}}>Ask ↵</button>
          </div>
        </div>
      )}
    </>
  );
};
